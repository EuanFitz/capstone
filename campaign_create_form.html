
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .form-wrap { padding: 1.5rem 0; font-family: var(--font-sans); max-width: 780px; }
  .form-header { margin-bottom: 2rem; }
  .form-header h1 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
  .form-header p { font-size: 14px; color: var(--color-text-secondary); margin-top: 4px; }
  .section { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
  .section-label { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1rem; }
  .field { margin-bottom: 1rem; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 6px; }
  .field label span { font-weight: 400; color: var(--color-text-secondary); margin-left: 4px; }
  .field input, .field select, .field textarea { width: 100%; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
  .freq-group { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
  .freq-btn { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 6px 14px; font-size: 13px; color: var(--color-text-secondary); cursor: pointer; transition: all 0.15s; }
  .freq-btn:hover { border-color: var(--color-border-primary); color: var(--color-text-primary); }
  .freq-btn.active { background: #E6F1FB; border-color: #378ADD; color: #185FA5; font-weight: 500; }
  .dept-filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .dept-tag { display: flex; align-items: center; gap: 6px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 5px 10px; font-size: 13px; color: var(--color-text-secondary); cursor: pointer; transition: all 0.15s; user-select: none; }
  .dept-tag:hover { border-color: var(--color-border-primary); color: var(--color-text-primary); }
  .dept-tag.active { background: #EAF3DE; border-color: #639922; color: #3B6D11; }
  .dept-tag .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; opacity: 0.7; }
  .recipient-list { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); max-height: 220px; overflow-y: auto; }
  .recipient-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-bottom: 0.5px solid var(--color-border-tertiary); transition: background 0.1s; cursor: pointer; }
  .recipient-item:last-child { border-bottom: none; }
  .recipient-item:hover { background: var(--color-background-secondary); }
  .recipient-item input[type="checkbox"] { accent-color: #378ADD; width: 15px; height: 15px; cursor: pointer; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; }
  .av-blue { background: #E6F1FB; color: #185FA5; }
  .av-green { background: #EAF3DE; color: #3B6D11; }
  .av-amber { background: #FAEEDA; color: #854F0B; }
  .av-purple { background: #EEEDFE; color: #534AB7; }
  .av-coral { background: #FAECE7; color: #993C1D; }
  .recipient-info { flex: 1; }
  .recipient-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
  .recipient-meta { font-size: 12px; color: var(--color-text-secondary); }
  .dept-badge { font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
  .badge-eng { background: #E6F1FB; color: #185FA5; }
  .badge-mkt { background: #EAF3DE; color: #3B6D11; }
  .badge-hr { background: #FAEEDA; color: #854F0B; }
  .badge-ops { background: #EEEDFE; color: #534AB7; }
  .badge-fin { background: #FAECE7; color: #993C1D; }
  .sel-summary { font-size: 12px; color: var(--color-text-secondary); margin-top: 8px; }
  .sel-summary b { color: var(--color-text-primary); font-weight: 500; }
  .search-wrap { position: relative; margin-bottom: 10px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); opacity: 0.4; }
  .search-wrap input { padding-left: 32px; }
  .form-footer { display: flex; align-items: center; justify-content: flex-end; gap: 10px; margin-top: 1.5rem; }
  .btn-secondary { background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 9px 20px; font-size: 14px; color: var(--color-text-secondary); cursor: pointer; }
  .btn-secondary:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }
  .btn-primary { background: #185FA5; border: none; border-radius: var(--border-radius-md); padding: 9px 22px; font-size: 14px; font-weight: 500; color: #E6F1FB; cursor: pointer; }
  .btn-primary:hover { background: #0C447C; }
  .custom-freq { margin-top: 10px; display: none; }
  .custom-freq.show { display: flex; align-items: center; gap: 8px; }
  .custom-freq input { width: 70px; }
  .custom-freq select { width: auto; }
</style>

<div class="form-wrap">
  <div class="form-header">
    <h1>Create campaign</h1>
    <p>Set up a new communication campaign and define your audience.</p>
  </div>

  <div class="section">
    <div class="section-label">Campaign details</div>
    <div class="field">
      <label>Campaign name</label>
      <input type="text" placeholder="e.g. Q2 Product Launch Outreach" />
    </div>
    <div class="field">
      <label>Description <span>optional</span></label>
      <textarea rows="3" placeholder="Describe the purpose, goals, or notes for this campaign…" style="resize: vertical;"></textarea>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Schedule</div>
    <div class="row-2">
      <div class="field">
        <label>Start date</label>
        <input type="date" id="start-date" />
      </div>
      <div class="field">
        <label>End date</label>
        <input type="date" id="end-date" />
      </div>
    </div>
    <div class="field" style="margin-bottom: 0;">
      <label>Send frequency</label>
      <div class="freq-group" id="freq-group">
        <div class="freq-btn active" data-val="once">Once</div>
        <div class="freq-btn" data-val="daily">Daily</div>
        <div class="freq-btn" data-val="weekly">Weekly</div>
        <div class="freq-btn" data-val="biweekly">Bi-weekly</div>
        <div class="freq-btn" data-val="monthly">Monthly</div>
        <div class="freq-btn" data-val="custom">Custom…</div>
      </div>
      <div class="custom-freq" id="custom-freq">
        <span style="font-size: 13px; color: var(--color-text-secondary);">Every</span>
        <input type="number" min="1" value="2" style="width: 64px;" />
        <select style="width: auto;">
          <option>days</option>
          <option>weeks</option>
          <option>months</option>
        </select>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Recipients</div>
    <div class="dept-filter-row" id="dept-filters">
      <div class="dept-tag active" data-dept="all"><div class="dot"></div>All</div>
      <div class="dept-tag" data-dept="Engineering"><div class="dot"></div>Engineering</div>
      <div class="dept-tag" data-dept="Marketing"><div class="dot"></div>Marketing</div>
      <div class="dept-tag" data-dept="HR"><div class="dot"></div>HR</div>
      <div class="dept-tag" data-dept="Operations"><div class="dot"></div>Operations</div>
      <div class="dept-tag" data-dept="Finance"><div class="dot"></div>Finance</div>
    </div>
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M11 11L14.5 14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" id="recipient-search" placeholder="Search by name or email…" />
    </div>
    <div class="recipient-list" id="recipient-list"></div>
    <div class="sel-summary" id="sel-summary">0 recipients selected</div>
  </div>

  <div class="form-footer">
    <button class="btn-secondary">Save draft</button>
    <button class="btn-primary">Launch campaign →</button>
  </div>
</div>

<script>
const people = [
  { name: "Alex Kim", email: "alex.kim@co.com", dept: "Engineering", av: "av-blue", initials: "AK" },
  { name: "Brianna Scott", email: "b.scott@co.com", dept: "Marketing", av: "av-green", initials: "BS" },
  { name: "Carlos Ruiz", email: "c.ruiz@co.com", dept: "HR", av: "av-amber", initials: "CR" },
  { name: "Dana Patel", email: "d.patel@co.com", dept: "Engineering", av: "av-blue", initials: "DP" },
  { name: "Eva Müller", email: "e.muller@co.com", dept: "Operations", av: "av-purple", initials: "EM" },
  { name: "Felix Wang", email: "f.wang@co.com", dept: "Finance", av: "av-coral", initials: "FW" },
  { name: "Grace Osei", email: "g.osei@co.com", dept: "Marketing", av: "av-green", initials: "GO" },
  { name: "Hassan Ali", email: "h.ali@co.com", dept: "Engineering", av: "av-blue", initials: "HA" },
  { name: "Irina Novak", email: "i.novak@co.com", dept: "HR", av: "av-amber", initials: "IN" },
  { name: "Jordan Lee", email: "j.lee@co.com", dept: "Operations", av: "av-purple", initials: "JL" },
  { name: "Keiko Tanaka", email: "k.tanaka@co.com", dept: "Finance", av: "av-coral", initials: "KT" },
  { name: "Liam Brooks", email: "l.brooks@co.com", dept: "Marketing", av: "av-green", initials: "LB" },
];

const deptBadge = { Engineering: "badge-eng", Marketing: "badge-mkt", HR: "badge-hr", Operations: "badge-ops", Finance: "badge-fin" };

let selected = new Set();
let activeDept = "all";
let searchQuery = "";

function renderList() {
  const list = document.getElementById("recipient-list");
  const filtered = people.filter(p => {
    const deptOk = activeDept === "all" || p.dept === activeDept;
    const q = searchQuery.toLowerCase();
    const searchOk = !q || p.name.toLowerCase().includes(q) || p.email.toLowerCase().includes(q);
    return deptOk && searchOk;
  });

  if (!filtered.length) {
    list.innerHTML = '<div style="padding: 16px 12px; font-size: 13px; color: var(--color-text-secondary);">No recipients match.</div>';
  } else {
    list.innerHTML = filtered.map((p, i) => `
      <div class="recipient-item" onclick="togglePerson('${p.email}')">
        <input type="checkbox" ${selected.has(p.email) ? "checked" : ""} onclick="event.stopPropagation(); togglePerson('${p.email}')" />
        <div class="avatar ${p.av}">${p.initials}</div>
        <div class="recipient-info">
          <div class="recipient-name">${p.name}</div>
          <div class="recipient-meta">${p.email}</div>
        </div>
        <span class="dept-badge ${deptBadge[p.dept]}">${p.dept}</span>
      </div>
    `).join("");
  }
  document.getElementById("sel-summary").innerHTML = selected.size === 0
    ? "0 recipients selected"
    : `<b>${selected.size}</b> recipient${selected.size !== 1 ? "s" : ""} selected`;
}

function togglePerson(email) {
  selected.has(email) ? selected.delete(email) : selected.add(email);
  renderList();
}

document.getElementById("dept-filters").addEventListener("click", e => {
  const tag = e.target.closest(".dept-tag");
  if (!tag) return;
  document.querySelectorAll(".dept-tag").forEach(t => t.classList.remove("active"));
  tag.classList.add("active");
  activeDept = tag.dataset.dept;
  renderList();
});

document.getElementById("recipient-search").addEventListener("input", e => {
  searchQuery = e.target.value;
  renderList();
});

document.getElementById("freq-group").addEventListener("click", e => {
  const btn = e.target.closest(".freq-btn");
  if (!btn) return;
  document.querySelectorAll(".freq-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  const cf = document.getElementById("custom-freq");
  btn.dataset.val === "custom" ? cf.classList.add("show") : cf.classList.remove("show");
});

renderList();
</script>
